server:
  port: "8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "2405"
  dbname: "apigateway"
  sslmode: "disable"
  max_conns: 10

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  pool_size: 10

security:
  jwt_secret: "your-super-secret-jwt-key-change-in-production"
  jwt_expiration: "24h"
  cors_enabled: true
  allowed_origins:
    - "*"
    - "http://localhost:3000"
    - "http://localhost:8080"

logging:
  level: "info"
  format: "json"
  output_path: "stdout"

routes:
  user-service: "http://localhost:8081"
  order-service: "http://localhost:8082"
  payment-service: "http://localhost:8083"
  inventory-service: "http://localhost:8084"
  notification-service: "http://localhost:8085"

# Cache configuration
cache:
  enabled: true
  ttl: "5m"
  cleanup_interval: "10m"

# Rate limiting configuration
rate_limit:
  default_requests: 100
  default_window: "1m"
  burst_size: 50

# Health check configuration
health:
  enabled: true
  check_interval: "30s"
  timeout: "5s"

# Validation configuration
validation:
  enabled: true
  strict_mode: false

# Monitoring configuration
monitoring:
  enabled: true
  metrics_port: "9090"
  prometheus_enabled: true
